services:

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend

  clipe_db:
    image: postgres:15
    environment:
      TZ: Europe/Moscow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clipe
    command: postgres -c timezone=Europe/Moscow
    ports:
      - "8888:5432"
    volumes:
      - clipe_db_data:/var/lib/postgresql/data
    networks:
      - backend

  crud_server:
    build: ./crud
    depends_on:
      - clipe_db
    env_file:
      - .env
    ports:
      - "${CRUD_SERVER_PORT}:8080"
    networks:
      - backend

  decision_server:
    build: ./decision
    depends_on:
      - clipe_db
    env_file:
      - .env
    ports:
      - "${DECISION_SERVER_PORT}:8080"
    networks:
      - backend
  

  # frontend:
  #   build: ./frontend
  #   command: npm run dev -- --host 0.0.0.0 --port 5173
  #   depends_on:
  #     - server
  #   networks:
  #     - backend

volumes:
  clipe_db_data:
  pgadmin_data:

networks:
  backend:
    driver: bridge